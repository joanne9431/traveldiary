<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimalist Travel Budget Pro v12.0</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Thai Budget">

    <style>
        /* 全域變數（顏色主題） */
        :root {
            --bg-color: #f0f4f8;   
            --card-bg: #ffffff;    
            --primary: #1abc9c;    
            --danger: #ff4d4f;     
            --success: #2ecc71;    
            --warning: #e67e22;    
            --text: #333333;       
            --grey: #e1e4e8;       
            
            /* Highlight 顏色背景 */
            --hl-flights: #e8f4fd; 
            --hl-flights-txt: #2980b9;
            --hl-stay: #fef5e7;    
            --hl-stay-txt: #d35400;
            --hl-insurance: #f9ebea; 
            --hl-insurance-txt: #c0392b; 
            --hl-dining: #fdebd0;  
            --hl-dining-txt: #e67e22;
            --hl-shopping: #f5eef8;
            --hl-shopping-txt: #8e44ad;
            --hl-tickets: #e8f8f5; 
            --hl-tickets-txt: #16a085;
            --hl-trans: #ebf5fb;   
            --hl-trans-txt: #566573;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 10px; 
            padding-top: 0; 
        }
        
        .card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 14px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            margin-bottom: 10px;
        }
        
        .top-sticky-card {
            border-top-left-radius: 0;
            border-top-right-radius: 0;
            margin-left: -10px;
            margin-right: -10px;
            margin-bottom: 12px;
            padding: 15px 12px;
            background: linear-gradient(135deg, #ffffff 0%, #f7f9fa 100%);
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }
        
        h2 { margin-top: 0; font-size: 0.9rem; color: #777; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        
        /* 整體水平置中 */
        .dashboard-layout {
            display: flex;
            justify-content: center; 
            align-items: center;
            gap: 35px; 
        }
        
        .total-box {
            flex: 0 0 auto; 
            padding-left: 6px; 
            text-align: left;
        }
        .total-amount { 
            font-size: 1.7rem; 
            font-weight: 900; 
            color: var(--primary); 
            margin-top: 2px;
            letter-spacing: -1px;
            line-height: 1.1;
        }
        .total-hkd-sub {
            font-size: 0.78rem;
            color: #888;
            font-weight: 600;
            margin-top: 2px;
        }
        
        .category-totals-box {
            display: flex;
            gap: 20px; 
            background: rgba(0, 0, 0, 0.03);
            padding: 6px 10px 6px 20px; 
            border-radius: 10px;
            border: 1px solid rgba(0, 0, 0, 0.01);
            width: auto; 
        }
        
        .cat-totals-col {
            display: flex;
            flex-direction: column;
            gap: 4px; 
        }
        
        .cat-total-item {
            display: flex;
            flex-direction: column;
            font-size: 0.75rem;
            color: #555;
            min-width: 72px; 
        }
        .cat-total-item .cat-name {
            color: #888;
            font-size: 0.7rem;
            white-space: nowrap;
        }
        .cat-total-item .cat-num {
            font-weight: 700;
            color: #222;
            white-space: nowrap;
        }
        
        .fx-rate-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #e8f8f5;
            padding: 8px 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #16a085;
        }
        .fx-rate-box input {
            width: 80px;
            padding: 4px 8px;
            margin: 0;
            border-radius: 6px;
            border: 1px solid #a3e4d7;
            text-align: center;
            font-size: 0.85rem;
        }

        input[type="number"], input[type="text"], input[type="date"], input[type="file"] {
            width: 100%;
            padding: 10px 12px; 
            margin: 4px 0;      
            border-radius: 8px;
            border: 1px solid var(--grey);
            box-sizing: border-box;
            font-size: 0.95rem;
            -webkit-appearance: none; 
        }
        input:focus { outline: none; border-color: var(--primary); } 
        
        /* 相片上傳與即時預覽區樣式 */
        .photo-upload-wrapper { margin: 8px 0; }
        .photo-upload-wrapper label { font-size: 0.75rem; color: #666; font-weight: bold; display: block; margin-bottom: 2px; }
        .preview-box { display: none; margin-top: 6px; position: relative; width: 80px; height: 80px; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1px solid var(--grey); }
        .btn-remove-photo { position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 0.6rem; display: flex; align-items: center; justify-content: center; padding: 0; border: none; }
        
        /* 歷史列表中的相片縮圖樣式 */
        .item-photo { width: 45px; height: 45px; object-fit: cover; border-radius: 6px; border: 1px solid #eee; cursor: pointer; }

        .edit-date-wrapper {
            background: #fafbfc;
            padding: 2px 0;
            margin: 4px 0;
        }
        .edit-date-wrapper label {
            font-size: 0.75rem;
            color: #666;
            font-weight: bold;
            display: block;
            margin-bottom: 2px;
        }
        
        button {
            width: 100%;
            padding: 11px;
            margin: 4px 0;
            border-radius: 8px;
            border: none;
            font-size: 0.95rem;
            font-weight: bold;
            transition: all 0.2s;
            -webkit-appearance: none;
            cursor: pointer;
        }
        button:active { opacity: 0.8; } 
        
        .btn-save { background-color: var(--primary); color: white; margin-top: 6px; }
        .btn-backup { background-color: #566573; color: white; margin-top: 6px; }
        
        .category-picker {
            display: flex;
            flex-direction: column;
            gap: 6px;       
            margin: 8px 0;
        }
        
        .category-row {
            display: flex;
            gap: 6px;
            width: 100%;
        }

        .category-row.top-row .category-btn {
            flex: 1 1 calc(33.33% - 4px);
        }

        .category-row.bottom-row .category-btn {
            flex: 1 1 calc(25% - 4.5px);
        }
        
        .category-btn {
            background-color: var(--card-bg);
            color: var(--text);
            border: 1.5px solid var(--grey);
            border-radius: 10px;
            padding: 8px 2px; 
            display: flex;
            flex-direction: column; 
            align-items: center;
            gap: 2px;
            margin: 0;
            box-sizing: border-box;
            transition: background-color 0.2s, border-color 0.2s, color 0.15s;
        }
        .category-btn .icon-label { font-size: 1.05rem; } 
        .category-btn .label { font-size: 0.75rem; font-weight: bold; } 
        
        .category-btn.active {
            color: white;
        }
        
        .edit-mode-indicator {
            display: none; 
            background-color: #f39c12;
            color: white;
            padding: 6px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .list-container { max-height: 380px; overflow-y: auto; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f2f5; }
        .list-item:last-child { border-bottom: none; }
        .item-info { display: flex; flex-direction: column; }
        
        .tag { 
            padding: 3px 8px; 
            border-radius: 5px; 
            font-size: 0.78rem; 
            font-weight: bold; 
            align-self: flex-start; 
        }
        
        .item-details { color: #aaa; font-size: 0.72rem; margin-top: 4px; display: flex; gap: 6px; align-items: center; }
        .time-text { font-weight: bold; color: #7f8c8d; background: #eaeded; padding: 1px 4px; border-radius: 4px; }
        .note-text { color: #555; font-weight: 500; background: #fffbe6; padding: 1px 4px; border-radius: 4px; border: 1px solid #ffe58f; } 

        .item-right { display: flex; align-items: center; gap: 4px; }
        .amount-zone { display: flex; flex-direction: column; text-align: right; margin-right: 4px; }
        .amount { font-weight: 700; font-size: 0.95rem; color: #222; }
        .amount-hkd { font-size: 0.72rem; color: #888; font-weight: 500; }
        
        .btn-action { background: none; padding: 4px; margin: 0; width: auto; font-size: 0.9rem; display: inline-block;}

        /* 📸 內建大圖彈出層樣式 (防 PWA 阻擋機制) */
        .photo-lightbox {
            display: none; 
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .photo-lightbox img {
            max-width: 92%;
            max-height: 82%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
        }
        .lightbox-close-tip {
            position: absolute;
            bottom: 40px;
            color: #ccc;
            font-size: 0.85rem;
            background: rgba(255,255,255,0.15);
            padding: 6px 16px;
            border-radius: 20px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="card top-sticky-card">
        <div class="dashboard-layout">
            <div class="total-box">
                <h2>Total Expenses</h2>
                <div class="total-amount">฿<span id="total">0</span></div>
                <div class="total-hkd-sub">≈ HK$ <span id="total-hkd">0</span></div>
            </div>
            <div class="category-totals-box" id="category-totals-container"></div>
        </div>
    </div>

    <div class="fx-rate-box">
        <span>Exchange Rate: 1 THB =</span>
        <input type="number" id="fx-rate" value="0.22" step="0.001" onchange="handleRateChange()" inputmode="decimal">
        <span>HKD</span>
    </div>

    <div class="card">
        <h2 id="form-title">Add Travel Record</h2>
        
        <div id="edit-indicator" class="edit-mode-indicator">✏️ Editing trip record...</div>
        
        <input type="number" id="amount" placeholder="Enter amount..." inputmode="decimal">
        <input type="text" id="note" placeholder="Enter details">
        
        <div class="edit-date-wrapper" id="date-field-block">
            <label for="edit-date">Transaction Date:</label>
            <input type="date" id="edit-date">
        </div>

        <div class="photo-upload-wrapper">
            <label>Add Photo (Receipt / Scenery):</label>
            <input type="file" id="photo-file" accept="image/*" onchange="previewPhoto(this)">
            <div class="preview-box" id="preview-box">
                <img id="preview-img" src="" alt="preview">
                <button type="button" class="btn-remove-photo" onclick="clearSelectedPhoto()">X</button>
            </div>
        </div>
        
        <div class="category-picker" id="category-picker"></div>
        
        <button class="btn-save" id="btn-save-main" onclick="handleSubmit()">Save Record</button>
    </div>

    <div class="card">
        <h2>Trip Expense History</h2>
        <div class="list-container" id="history-list"></div>
    </div>

    <div style="padding: 0 2px;">
        <button class="btn-backup" onclick="exportToCSV()">Backup Trip Data</button>
    </div>

    <div id="lightbox" class="photo-lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="Full size photo">
        <div class="lightbox-close-tip">點擊任意處關閉圖片</div>
    </div>

    <script>
        // 使用萬用開源匿名上傳 Client ID
        const IMGUR_CLIENT_ID = "546c25a59d58ad7"; 
        
        // 使用 v5 版本隔離資料庫
        const DATA_FILE = "travel_thb_records_v5.json";
        let globalFxRate = 0.22;
        
        let categories = ["✈️ Flights", "🏨 Stay", "🛡️ Insurance", "🍱 Dining", "🛍️ Shopping", "🎟️ Tickets", "🚌 Transport"];
        let records = [];           
        let selectedCategory = "";  
        let editingRecordId = null; 
        let currentPhotoUrl = ""; 
        let currentRecordTime = ""; 

        function checkIsHkdMode(catName) {
            return catName === "✈️ Flights" || catName === "🏨 Stay" || catName === "🛡️ Insurance";
        }

        async function init() {
            if(categories.length > 0) selectedCategory = categories[0];
            setTodayDate();
            
            const savedRate = localStorage.getItem('thb_fx_rate');
            if(savedRate) {
                globalFxRate = parseFloat(savedRate);
                document.getElementById('fx-rate').value = globalFxRate;
            }

            await loadRecords();     
            renderCategories();   
            renderRecords();      
        }

        function setTodayDate() {
            const now = new Date();
            document.getElementById('edit-date').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        }

        function handleRateChange() {
            const rateInput = document.getElementById('fx-rate');
            let val = parseFloat(rateInput.value);
            if(isNaN(val) || val <= 0) val = 0.22;
            globalFxRate = val;
            localStorage.setItem('thb_fx_rate', globalFxRate);
            renderRecords(); 
        }

        async function loadRecords() {
            try {
                const root = await navigator.storage.getDirectory(); 
                const fileHandle = await root.getFileHandle(DATA_FILE, { create: true });
                const file = await fileHandle.getFile();
                const text = await file.text();
                records = text ? JSON.parse(text) : [];
            } catch (e) {
                records = JSON.parse(localStorage.getItem('thb_rec_v5')) || [];
            }
        }

        async function saveRecords() {
            try {
                const root = await navigator.storage.getDirectory();
                const fileHandle = await root.getFileHandle(DATA_FILE, { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(JSON.stringify(records));
                await writable.close();
            } catch (e) {
                localStorage.setItem('thb_rec_v5', JSON.stringify(records));
            }
        }

        function previewPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview-img').src = e.target.result;
                    document.getElementById('preview-box').style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function clearSelectedPhoto() {
            document.getElementById('photo-file').value = "";
            document.getElementById('preview-img').src = "";
            document.getElementById('preview-box').style.display = 'none';
            currentPhotoUrl = "";
        }

        // Imgur 雲端上傳 + 本地 Base64 雙備用機制
        async function uploadImageToImgur(file) {
            const getBase64 = (f) => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(f);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });

            const formData = new FormData();
            formData.append("image", file);

            try {
                const response = await fetch("https://api.imgur.com/3/image", {
                    method: "POST",
                    headers: { Authorization: `Client-ID ${IMGUR_CLIENT_ID}` },
                    body: formData
                });
                const result = await response.json();
                if (result.success) {
                    return result.data.link; 
                } else {
                    throw new Error("Imgur Upload Failed");
                }
            } catch (error) {
                console.warn("Imgur 雲端失敗，啟動本地安全防漏備用機制...", error);
                try {
                    const localBase64 = await getBase64(file);
                    return localBase64; 
                } catch (e) {
                    console.error("本地儲存失敗:", e);
                    return "";
                }
            }
        }

        // 📸 點擊縮圖直接呼叫此函式放大圖片，避開瀏覽器限制
        function openLightbox(imgSrc) {
            document.getElementById('lightbox-img').src = imgSrc;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.getElementById('lightbox-img').src = '';
        }

        function renderCategories() {
            const picker = document.getElementById('category-picker');
            picker.innerHTML = ''; 
            
            let topRowHtml = '<div class="category-row top-row">';
            let bottomRowHtml = '<div class="category-row bottom-row">';

            categories.forEach(cat => {
                const isActive = (cat === selectedCategory);
                const activeClass = isActive ? 'active' : '';
                const parts = cat.split(' ');
                const icon = parts[0];
                const label = parts.slice(1).join(' ');

                let customStyle = '';
                if (isActive) {
                    let bgColor = 'var(--grey)';
                    let txtColor = 'var(--text)';
                    
                    if (cat.includes("Flights")) { bgColor = 'var(--hl-flights)'; txtColor = 'var(--hl-flights-txt)'; }
                    if (cat.includes("Stay")) { bgColor = 'var(--hl-stay)'; txtColor = 'var(--hl-stay-txt)'; }
                    if (cat.includes("Insurance")) { bgColor = 'var(--hl-insurance)'; txtColor = 'var(--hl-insurance-txt)'; }
                    if (cat.includes("Dining")) { bgColor = 'var(--hl-dining)'; txtColor = 'var(--hl-dining-txt)'; }
                    if (cat.includes("Shopping")) { bgColor = 'var(--hl-shopping)'; txtColor = 'var(--hl-shopping-txt)'; }
                    if (cat.includes("Tickets")) { bgColor = 'var(--hl-tickets)'; txtColor = 'var(--hl-tickets-txt)'; }
                    if (cat.includes("Transport")) { bgColor = 'var(--hl-trans)'; txtColor = 'var(--hl-trans-txt)'; }
                    
                    customStyle = `style="background-color: ${bgColor}; color: ${txtColor} !important; border-color: ${bgColor};"`;
                }

                const buttonHtml = `
                    <button type="button" class="category-btn ${activeClass}" ${customStyle} onclick="selectCategory('${cat}', this)">
                        <span class="icon-label">${icon}</span>
                        <span class="label">${label}</span>
                    </button>
                `;

                if (cat === "✈️ Flights" || cat === "🏨 Stay" || cat === "🛡️ Insurance") {
                    topRowHtml += buttonHtml;
                } else {
                    bottomRowHtml += buttonHtml;
                }
            });

            topRowHtml += '</div>';
            bottomRowHtml += '</div>';

            picker.innerHTML = topRowHtml + bottomRowHtml;
            updatePlaceholder(selectedCategory);
        }

        function selectCategory(cat, btn) {
            selectedCategory = cat; 
            renderCategories(); 
        }

        function updatePlaceholder(cat) {
            const amtInput = document.getElementById('amount');
            if (checkIsHkdMode(cat)) {
                amtInput.placeholder = "Enter amount in HKD";
            } else {
                amtInput.placeholder = "Enter amount in THB";
            }
        }

        async function handleSubmit() {
            const amountInput = document.getElementById('amount');
            const noteInput = document.getElementById('note'); 
            const dateInput = document.getElementById('edit-date');
            const photoInput = document.getElementById('photo-file');
            
            let inputAmount = parseFloat(amountInput.value);
            const note = noteInput.value.trim(); 

            if (isNaN(inputAmount) || inputAmount <= 0) return alert('請輸入正確且大於 0 的金額！');
            
            let targetDate = dateInput.value || `${new Date().getFullYear()}-06-01`;
            let finalThbAmount = inputAmount;
            let isHkdMode = checkIsHkdMode(selectedCategory);

            if (isHkdMode) {
                finalThbAmount = Math.round(inputAmount / globalFxRate);
            }

            const saveBtn = document.getElementById('btn-save-main');
            saveBtn.innerText = "Saving record & photo...";
            saveBtn.disabled = true;

            let finalPhotoUrl = currentPhotoUrl; 
            if (photoInput.files && photoInput.files[0]) {
                finalPhotoUrl = await uploadImageToImgur(photoInput.files[0]);
            }

            if (editingRecordId !== null) {
                const recordIndex = records.findIndex(r => r.id === editingRecordId);
                if(recordIndex !== -1) {
                    records[recordIndex].amount = finalThbAmount;
                    records[recordIndex].category = selectedCategory;
                    records[recordIndex].note = note; 
                    records[recordIndex].date = targetDate;
                    records[recordIndex].wasHkdInput = isHkdMode ? inputAmount : null; 
                    records[recordIndex].photoUrl = finalPhotoUrl;
                    
                    if (!records[recordIndex].time) {
                        records[recordIndex].time = currentRecordTime || "00:00";
                    }
                }
                editingRecordId = null;
                currentRecordTime = "";
                document.getElementById('form-title').innerText = "Add Travel Record";
                saveBtn.style.backgroundColor = "var(--primary)";
                document.getElementById('edit-indicator').style.display = "none"; 
            } else {
                const now = new Date();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const formattedTime = `${hours}:${minutes}`;

                const newRecord = {
                    id: Date.now(), 
                    amount: finalThbAmount,
                    category: selectedCategory,
                    note: note, 
                    date: targetDate,
                    time: formattedTime, 
                    wasHkdInput: isHkdMode ? inputAmount : null,
                    photoUrl: finalPhotoUrl
                };
                records.unshift(newRecord);
            }

            records.sort((a, b) => {
                let dateCompare = b.date.localeCompare(a.date);
                if (dateCompare !== 0) return dateCompare;
                let timeA = a.time || "00:00";
                let timeB = b.time || "00:00";
                return timeB.localeCompare(timeA) || b.id - a.id;
            });

            await saveRecords();     
            
            amountInput.value = '';  
            noteInput.value = '';  
            clearSelectedPhoto();
            setTodayDate(); 
            
            saveBtn.innerText = "Save Record";
            saveBtn.disabled = false;
            
            renderRecords();         
        }

        function startEdit(id) {
            const record = records.find(r => r.id === id);
            if(!record) return;

            editingRecordId = id; 
            document.getElementById('amount').value = record.wasHkdInput ? record.wasHkdInput : record.amount;
            document.getElementById('note').value = record.note || ''; 
            document.getElementById('edit-date').value = record.date; 
            selectedCategory = record.category;
            
            currentRecordTime = record.time || ""; 

            if (record.photoUrl) {
                currentPhotoUrl = record.photoUrl;
                document.getElementById('preview-img').src = record.photoUrl;
                document.getElementById('preview-box').style.display = 'block';
            } else {
                clearSelectedPhoto();
            }
            
            document.getElementById('form-title').innerText = "Edit Trip Record";
            document.getElementById('btn-save-main').innerText = "Update Record";
            document.getElementById('btn-save-main').style.backgroundColor = "var(--warning)";
            document.getElementById('edit-indicator').style.display = "block";
            
            renderCategories(); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteRecord(id) {
            if (confirm("確認要刪除此筆記帳紀錄嗎？")) {
                records = records.filter(r => r.id !== id);
                await saveRecords(); 
                renderRecords();     
            }
        }

        function getHighlightStyle(category) {
            if (category.includes("Flights")) return "background-color: var(--hl-flights); color: var(--hl-flights-txt);";
            if (category.includes("Stay")) return "background-color: var(--hl-stay); color: var(--hl-stay-txt);";
            if (category.includes("Insurance")) return "background-color: var(--hl-insurance); color: var(--hl-insurance-txt);"; 
            if (category.includes("Dining")) return "background-color: var(--hl-dining); color: var(--hl-dining-txt);";
            if (category.includes("Shopping")) return "background-color: var(--hl-shopping); color: var(--hl-shopping-txt);";
            if (category.includes("Tickets")) return "background-color: var(--hl-tickets); color: var(--hl-tickets-txt);";
            return "background-color: var(--hl-trans); color: var(--hl-trans-txt);";
        }

        function renderRecords() {
            const listContainer = document.getElementById('history-list');
            const totalContainer = document.getElementById('total');
            const totalHkdContainer = document.getElementById('total-hkd');
            const catTotalsContainer = document.getElementById('category-totals-container');
            
            listContainer.innerHTML = ''; 
            catTotalsContainer.innerHTML = '';
            
            let totalThb = 0;
            let totalHkd = 0;
            let catSumsThb = {};
            categories.forEach(cat => { catSumsThb[cat] = 0; });

            records.forEach(r => {
                let currentItemHkd = (checkIsHkdMode(r.category) && r.wasHkdInput) ? r.wasHkdInput : Math.round(r.amount * globalFxRate);
                let currentItemThb = r.amount;

                totalThb += currentItemThb;
                totalHkd += currentItemHkd;
                
                if (catSumsThb[r.category] !== undefined) {
                    catSumsThb[r.category] += currentItemThb;
                }

                const noteHTML = r.note ? `<span class="note-text">${r.note}</span>` : '';
                const colorStyle = getHighlightStyle(r.category);
                const displayCategoryLabel = r.category.split(' ').slice(1).join(' ');
                
                const timeHTML = r.time ? `<span class="time-text">${r.time}</span>` : '';
                
                // 🛠️ 修正關鍵：將超連結 <a> 改為直接綁定 openLightbox 點擊事件，安全放大圖片！
                const photoHTML = r.photoUrl ? `<img src="${r.photoUrl}" class="item-photo" alt="receipt" onclick="openLightbox('${r.photoUrl}')">` : '';

                listContainer.innerHTML += `
                    <div class="list-item">
                        <div class="item-info">
                            <span class="tag" style="${colorStyle}">${displayCategoryLabel}</span>
                            <div class="item-details">
                                <span>${r.date} ${timeHTML}</span>
                                ${noteHTML}
                            </div>
                        </div>
                        <div class="item-right">
                            ${photoHTML}
                            <div class="amount-zone">
                                <span class="amount">฿${currentItemThb.toLocaleString()}</span>
                                <span class="amount-hkd">HK$${currentItemHkd.toLocaleString()}</span>
                            </div>
                            <button class="btn-action" onclick="startEdit(${r.id})">✏️</button>
                            <button class="btn-action" onclick="deleteRecord(${r.id})">🗑️</button>
                        </div>
                    </div>
                `;
            });

            if (records.length === 0) {
                listContainer.innerHTML = `<div style="color: #bbb; text-align: center; padding: 20px; font-size: 0.9rem;">No trip transactions yet.</div>`;
            }

            totalContainer.innerText = totalThb.toLocaleString();
            totalHkdContainer.innerText = totalHkd.toLocaleString();

            let leftColHtml = '<div class="cat-totals-col">';
            let rightColHtml = '<div class="cat-totals-col">';

            const leftOrder = ["✈️ Flights", "🏨 Stay", "🛡️ Insurance"];
            leftOrder.forEach(cat => {
                const sum = catSumsThb[cat] || 0;
                leftColHtml += `
                    <div class="cat-total-item">
                        <span class="cat-name">${cat.split(' ').slice(1).join(' ')}</span>
                        <span class="cat-num">฿${sum.toLocaleString()}</span>
                    </div>
                `;
            });

            const rightOrder = ["🍱 Dining", "🛍️ Shopping", "🎟️ Tickets", "🚌 Transport"];
            rightOrder.forEach(cat => {
                const sum = catSumsThb[cat] || 0;
                rightColHtml += `
                    <div class="cat-total-item">
                        <span class="cat-name">${cat.split(' ').slice(1).join(' ')}</span>
                        <span class="cat-num">฿${sum.toLocaleString()}</span>
                    </div>
                `;
            });

            leftColHtml += '</div>';
            rightColHtml += '</div>';

            catTotalsContainer.innerHTML = leftColHtml + rightColHtml;
        }

        function exportToCSV() {
            if (records.length === 0) return alert("目前沒有可匯出的數據！");
            let sortedRecords = [...records].sort((a, b) => a.date.localeCompare(b.date) || (a.time || "").localeCompare(b.time || ""));
            let csvContent = "\uFEFFDate,Time,Category,Amount(THB),HKD(Est),Notes,PhotoUrl\n"; 
            
            let lastIsoDate = "";
            let dayTotalThb = 0, dayTotalHkd = 0; 
            let tripTotalThb = 0, tripTotalHkd = 0; 

            for (let i = 0; i < sortedRecords.length; i++) {
                const r = sortedRecords[i];
                const nextRecord = sortedRecords[i + 1];

                const currentIsoDate = r.date;
                let nextIsoDate = nextRecord ? nextRecord.date : null;

                const rawCategory = r.category.split(' ').slice(1).join(' ');
                const category = rawCategory.includes(',') ? `"${rawCategory}"` : rawCategory;
                const note = r.note && r.note.includes(',') ? `"${r.note}"` : (r.note || '');
                const pUrl = r.photoUrl || '';
                const timeStr = r.time || '';
                
                let currentItemHkd = r.wasHkdInput ? r.wasHkdInput : Math.round(r.amount * globalFxRate);
                let currentItemThb = r.amount;

                let displayDate = (currentIsoDate !== lastIsoDate) ? currentIsoDate : "";
                if(displayDate) lastIsoDate = currentIsoDate;
                
                csvContent += `${displayDate},${timeStr},${category},฿${currentItemThb},HK$${currentItemHkd},${note},${pUrl}\n`;

                if (!checkIsHkdMode(r.category)) {
                    dayTotalThb += currentItemThb;
                    dayTotalHkd += currentItemHkd;
                }

                tripTotalThb += currentItemThb;
                tripTotalHkd += currentItemHkd;

                if (!nextRecord || nextIsoDate !== currentIsoDate) {
                    if (dayTotalThb > 0) {
                        csvContent += `,,Daily Total,฿${dayTotalThb},HK$${dayTotalHkd},,\n`;
                    }
                    dayTotalThb = 0; 
                    dayTotalHkd = 0;
                }
                
                if (!nextRecord) {
                    csvContent += `,,Trip Total,฿${tripTotalThb},HK$${tripTotalHkd},,\n`;
                }
            }
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `Trip_Budget_Report_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        init();
    </script>
</body>
</html>
